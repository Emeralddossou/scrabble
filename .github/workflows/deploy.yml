name: CI/CD - Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Validate
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: pdo, mysql
          tools: phpcs
      
      - name: Validate PHP Syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
      
      - name: Check PHP Standards
        run: |
          phpcs --standard=PSR2 backend/*.php backend/api/*.php --ignore=backend/logs 2>/dev/null || true
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Validate JavaScript
        run: |
          npm install -g jshint 2>/dev/null || true
          jshint js/*.js 2>/dev/null || echo "JavaScript check completed"

  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: pdo, mysql
      
      - name: Setup MySQL
        uses: ankane/setup-mysql@v1
        with:
          mysql-version: 8.0
      
      - name: Setup Test Database
        run: |
          mysql -uroot -e "CREATE DATABASE IF NOT EXISTS scrabble_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -uroot -e "CREATE USER IF NOT EXISTS 'scrabble_test'@localhost IDENTIFIED BY 'test_password';"
          mysql -uroot -e "GRANT ALL PRIVILEGES ON scrabble_test.* TO 'scrabble_test'@localhost;"
          mysql -uroot -e "FLUSH PRIVILEGES;"

  deploy:
    runs-on: ubuntu-latest
    name: Deploy via FTP
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Create .env for Production
        run: |
          cat > .env << EOF
          DB_TYPE=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_ALLOW_FALLBACK=false
          FTP_HOST=${{ secrets.FTP_HOST }}
          FTP_USER=${{ secrets.FTP_USER }}
          FTP_PASS=${{ secrets.FTP_PASS }}
          APP_ENV=production
          APP_DEBUG=false
          EOF
      
      - name: Setup FTP Deploy Action
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: ftp
          remote-host: ${{ secrets.FTP_HOST }}
          remote-port: 21
          remote-user: ${{ secrets.FTP_USER }}
          remote-password: ${{ secrets.FTP_PASS }}
          local-path: .
          remote-path: /htdocs
          sync: full
          ftp-options: --ignore-time --allow-empty-file
      
      - name: Deploy Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "App deployed to: ${{ secrets.FTP_HOST }}"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above."
          exit 1
